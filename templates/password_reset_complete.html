{% extends 'base.html' %}
{% block title %}Password Reset Complete — Campus Design{% endblock %}

{% block content %}
<div class="container mt-5 pt-4 pb-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card-plain p-5 text-center" style="border:2px solid var(--orange)!important;">
                <div class="display-1 mb-3">✅</div>
                <h3 class="fw-bold mb-3">Password Reset!</h3>
                <p class="text-muted">Your password has been set. You can now login with your new password.</p>
                <a href="{% url 'login' %}" class="btn btn-pink px-5 mt-3">Login Now</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

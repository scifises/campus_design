{% extends 'base.html' %}
{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="display-1 mb-4">😵</div>
    <h1 class="fw-bold mb-3">500</h1>
    <h3 class="fw-bold mb-3">Server Error</h3>
    <p class="text-muted mb-4">Something went wrong on our end. We're working to fix it.</p>
    <div class="d-flex justify-content-center gap-3">
        <a href="{% url 'index' %}" class="btn btn-pink px-4">🏠 Go Home</a>
        <a href="javascript:location.reload()" class="btn btn-outline-secondary px-4">🔄 Try Again</a>
    </div>
</div>
{% endblock %}

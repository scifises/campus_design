{% extends 'base.html' %}
{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="display-1 mb-4">🔍</div>
    <h1 class="fw-bold mb-3">404</h1>
    <h3 class="fw-bold mb-3">Page Not Found</h3>
    <p class="text-muted mb-4">Sorry, the page you're looking for doesn't exist or has been moved.</p>
    <div class="d-flex justify-content-center gap-3">
        <a href="{% url 'index' %}" class="btn btn-pink px-4">🏠 Go Home</a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">← Go Back</a>
    </div>
</div>
{% endblock %}
